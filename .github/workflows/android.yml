<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظم الصلاحية الذكي</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --primary: #bb86fc;
            --danger: #cf6679; --success: #03dac6; --text: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; transition: 0.3s; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* البطاقات */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; border-right: 4px solid var(--success); }
        .urgent { border-right-color: var(--danger); }
        
        /* المحادثة */
        .chat-box { height: 300px; background: #181818; border-radius: 10px; padding: 10px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #333; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .msg.sent { background: var(--primary); color: #000; align-self: flex-start; }
        .msg.received { background: #333; color: #fff; }

        /* مدخلات */
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); font-weight: bold; cursor: pointer; }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; width: 100%; background: #1f1f1f; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-btn { color: #888; font-size: 12px; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

    <!-- 1. الشاشة الرئيسية -->
    <div id="home" class="screen active">
        <h2 style="color: var(--primary)">مخزوني 📦</h2>
        <div class="card urgent">
            <div style="flex:1"><strong>حليب طازج</strong><br><small>1 لتر - 15 ريال</small></div>
            <div style="color: var(--danger); font-size: 12px;">تنتهي غداً</div>
        </div>
        <div class="card">
            <div style="flex:1"><strong>تفاح</strong><br><small>2 كجم - 10 ريال</small></div>
            <div style="color: var(--success); font-size: 12px;">صالح أسبوع</div>
        </div>
    </div>

    <!-- 2. شاشة الإضافة -->
    <div id="add" class="screen">
        <h2 style="color: var(--primary)">إضافة منتج ➕</h2>
        <div style="border: 2px dashed #444; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-radius: 10px;">📸 مسح باركود / صورة</div>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <div style="display: flex; gap: 10px;">
            <input type="text" placeholder="الوزن">
            <input type="number" placeholder="السعر">
        </div>
        <input type="date">
        <button onclick="changeScreen('home')">حفظ المنتج</button>
    </div>

    <!-- 3. شاشة المحادثة -->
    <div id="chat" class="screen">
        <h2 style="color: var(--primary)">طلب نواقص 💬</h2>
        <div id="chatBox" class="chat-box">
            <div class="msg received">مرحباً! كيف أخدمك؟<br><small style="color:#aaa">Hello! How can I help you?</small></div>
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="اكتب طلبك هنا...">
            <button style="width: 60px;" onclick="sendMessage()">إرسال</button>
        </div>
        <p style="font-size: 10px; color: #888; text-align: center;">الترجمة تلقائية (عربي/إنجليزي)</p>
    </div>

    <!-- القائمة السفلية -->
    <div class="nav">
        <div class="nav-btn active" onclick="changeScreen('home')">🏠<br>الرئيسية</div>
        <div class="nav-btn" onclick="changeScreen('add')">➕<br>إضافة</div>
        <div class="nav-btn" onclick="changeScreen('chat')">💬<br>المحادثة</div>
    </div>

    <script>
        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function sendMessage() {
            let input = document.getElementById('chatInput');
            let box = document.getElementById('chatBox');
            if(input.value.trim() !== "") {
                // إضافة رسالة المستخدم (تجريبي)
                box.innerHTML += `<div class="msg sent">${input.value}<br><small>[Translating...]</small></div>`;
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
